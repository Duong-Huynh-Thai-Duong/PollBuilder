name: Build and Deploy to Render

on:
  push:
    branches: [ "SecondLife" ] # Triggers the pipeline whenever you push to this branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x 

      - name: Lint and Static Analysis (Merit Requirement)
        run: dotnet format --verify-no-changes

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: PollBuilder.MVC/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pollbuilder:latest

      - name: Deploy to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
